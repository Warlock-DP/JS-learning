version: '3.8'

services:
  js-learning:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: js-learning-env
    volumes:
      - .:/workspaces/JS-learning
      - node_modules:/workspaces/JS-learning/node_modules
    ports:
      - "3000:3000"
      - "5500:5500"
      - "8080:8080"
    stdin_open: true
    tty: true
    environment:
      - NODE_ENV=development

volumes:
  node_modules:
